name: Deploy API to Railway

# Railway auto-deploys on push to main via GitHub App integration.
# This workflow is intentionally minimal — just a status record.
# Setup: Railway dashboard → loopguard-api service → Settings → Source → Connect Repo → main

on:
  workflow_dispatch:  # manual trigger only — Railway handles auto-deploy

jobs:
  notify:
    name: Railway handles deploy automatically
    runs-on: ubuntu-22.04
    steps:
      - run: echo "Railway auto-deploys from GitHub. See https://railway.app/project/739d9449-3dc4-422b-ab46-838d3e14d6bc"
