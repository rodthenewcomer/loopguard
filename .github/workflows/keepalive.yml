name: Supabase keepalive

# Ping the API every 3 days so Supabase free-tier project never pauses.
on:
  schedule:
    - cron: '0 9 */3 * *'   # 09:00 UTC every 3rd day
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.API_URL }}/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          fi
