name: Keepalive — Supabase + API + Web

# Ping all services every 3 days so Supabase free-tier never pauses
# and Railway/Render API doesn't spin down.
on:
  schedule:
    - cron: '0 9 */3 * *'   # 09:00 UTC every 3rd day
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ping:
    name: Health check all services
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping API /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.API_URL }}/health")
          echo "API health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::API health check returned $STATUS — service may be cold-starting"
          fi

      - name: Ping Web /api/health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "${{ secrets.WEB_URL }}/api/health")
          echo "Web health: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Web health check returned $STATUS"
          fi

      - name: Ping Supabase REST (keeps project active)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          echo "Supabase REST: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Supabase returned $STATUS — project may need attention"
          fi
